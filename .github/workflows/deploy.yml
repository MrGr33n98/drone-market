name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  AWS_REGION: us-east-2
  EC2_HOST: ec2-18-223-122-46.us-east-2.compute.amazonaws.com
  EC2_USER: ubuntu
  APP_PATH: /home/ubuntu/apps/noticed_v2
  RAILS_ENV: production

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: noticed_v2_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2.2
        bundler-cache: true
    
    - name: Setup test database
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/noticed_v2_test
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate
    
    - name: Run tests
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/noticed_v2_test
      run: |
        bundle exec rails test
        bundle exec rails test:system

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2.2
        bundler-cache: true
    
    - name: Install dependencies
      run: |
        bundle config set --local deployment true
        bundle config set --local without development test
        bundle install
    
    - name: Precompile assets
      env:
        RAILS_ENV: production
        SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      run: |
        bundle exec rails assets:precompile
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
        chmod 600 ~/.ssh/ec2_key.pem
        ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/ec2_key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
          set -e
          
          # Create app directory
          sudo mkdir -p ${{ env.APP_PATH }}
          sudo chown ${{ env.EC2_USER }}:${{ env.EC2_USER }} ${{ env.APP_PATH }}
          cd ${{ env.APP_PATH }}
          
          # Clone/update repository
          if [ -d .git ]; then
            git pull origin main || git pull origin master
          else
            git clone ${{ github.server_url }}/${{ github.repository }}.git .
          fi
          
          # Install dependencies
          bundle config set --local deployment true
          bundle config set --local without development test
          bundle install
          
          # Setup environment
          echo "RAILS_ENV=production" > .env
          echo "SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "RAILS_SERVE_STATIC_FILES=true" >> .env
          
          # Precompile assets
          RAILS_ENV=production bundle exec rails assets:precompile
          
          # Run migrations
          RAILS_ENV=production bundle exec rails db:migrate
          
          # Restart application
          sudo systemctl restart noticed_v2
          sudo systemctl restart nginx
          
          echo "Deploy completed successfully!"
        EOF
    
    - name: Health check
      run: |
        sleep 30
        curl -f http://${{ env.EC2_HOST }}/health || exit 1